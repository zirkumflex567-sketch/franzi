<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rodeo Schwierigkeitsgrad</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { 
      background: #111; 
      color: white; 
      font-family: 'Fredoka', sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      text-align: center;
      padding: 20px;
    }
    h1 { color: #f39c12; margin-bottom: 10px; font-size: 2.2rem; }
    p { font-size: 1.1rem; color: #ccc; max-width: 400px; line-height: 1.5; }
    .val-display { font-size: 4rem; font-weight: bold; color: #fff; margin: 20px 0; text-shadow: 0 0 15px rgba(243,156,18,0.5); }
    
    input[type="range"] { 
      width: 100%; 
      max-width: 400px; 
      margin: 20px 0 40px; 
      accent-color: #f39c12;
      height: 8px;
    }
    
    .btn-start { 
      padding: 15px 40px; 
      font-size: 1.5rem; 
      background: linear-gradient(135deg, #f39c12, #d35400); 
      color: white;
      border: none; 
      border-radius: 50px; 
      cursor: pointer; 
      font-weight: bold; 
      box-shadow: 0 5px 20px rgba(243,156,18,0.4);
      transition: transform 0.2s;
    }
    .btn-start:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <h1>Schwierigkeitsgrad</h1>
  <p>Verändere die Schwerkraft und Unruhe des Pferdes.<br><strong>1.00</strong> ist der Standard-Wert (Brutal).</p>
  
  <div class="val-display" id="valDisplay">1.00</div>
  
  <input type="range" id="diffSlider" min="0.1" max="3.0" step="0.05" value="1.0" oninput="document.getElementById('valDisplay').innerText = parseFloat(this.value).toFixed(2)">
  
  <button class="btn-start" onclick="window.location.href = '../index.html?diff=' + document.getElementById('diffSlider').value">Rodeo Starten</button>
</body>
</html>
